spring:
  datasource:
    url: jdbc:h2:mem:nursing_training;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 1s

app:
  jwt:
    secret: test-secret-key-that-is-longer-than-thirty-two-bytes
