spring:
  profiles:
    active: local
  application:
    name: nursing-training-backend
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfigurationV2

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/nursing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:100MB}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value:  "NOW()"
      logic-not-delete-value: "NULL"

app:
  jwt:
    secret: ${JWT_SECRET:nursing-training-secret-key-for-jwt-token-generation-2026}
    expiration: ${JWT_EXPIRATION:2h}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  websocket:
    endpoint: ${WS_ENDPOINT:/ws/notifications}
    ticket-expiration: ${WS_TICKET_EXPIRATION:60s}
    idle-timeout: ${WS_IDLE_TIMEOUT:60s}
    heartbeat-interval: ${WS_HEARTBEAT_INTERVAL:30s}
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  upload:
    max-size: ${APP_UPLOAD_MAX_BYTES:314572800}
    allowed-content-types: ${APP_UPLOAD_TYPES:image/jpeg,image/png,image/gif,application/pdf,video/mp4,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint}

  learning-report:
    enabled: ${AI_REPORT_ENABLED:true}

    eligibility:
      onboarding-days: ${AI_REPORT_ONBOARDING_DAYS:7}
      full-report-min-data-score: ${AI_REPORT_MIN_DATA_SCORE:50}
      minimum-learning-events: ${AI_REPORT_MIN_EVENTS:1}
      minimum-mastery-questions: ${AI_REPORT_MIN_QUESTIONS:5}

    generation:
      daily-limit: ${AI_REPORT_DAILY_LIMIT:3}
      regenerate-daily-limit: ${AI_REPORT_REGENERATE_LIMIT:2}
      max-strengths: 3
      max-weaknesses: 3
      max-plan-items: 7
      reuse-unchanged-snapshot: true

    ai:
      enabled: ${AI_ENABLED:true}
      provider: ${AI_PROVIDER:openai-compatible}
      base-url: ${AI_BASE_URL:}
      api-key: ${AI_API_KEY:}
      model: ${AI_MODEL:}
      chat-path: ${AI_CHAT_PATH:/chat/completions}
      connect-timeout: ${AI_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_READ_TIMEOUT:60s}
      max-retries: ${AI_MAX_RETRIES:2}
      temperature: ${AI_TEMPERATURE:0.3}
      max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:2000}
      prompt-version: ${AI_PROMPT_VERSION:learning-report-v1.0}
      schema-version: ${AI_SCHEMA_VERSION:1.0}

    fallback:
      enabled: true

    recovery:
      enabled: true
      scan-interval: 1m
      pending-timeout: 5m
      generating-timeout: 3m


  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:shared-doc-backend}
    domain: ${ALIYUN_OSS_DOMAIN:}
