spring:
  application:
    name: nursing-training-backend
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfigurationV2

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/nursing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:100MB}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value:  "NOW()"
      logic-not-delete-value: "NULL"

app:
  jwt:
    secret: ${JWT_SECRET:nursing-training-secret-key-for-jwt-token-generation-2026}
    expiration: ${JWT_EXPIRATION:2h}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  upload:
    max-size: ${APP_UPLOAD_MAX_BYTES:104857600}
    allowed-content-types: ${APP_UPLOAD_TYPES:image/jpeg,image/png,image/gif,application/pdf,video/mp4,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint}
  vod:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    region-id: ${VOD_REGION_ID:cn-shanghai}
    transcode-template-group-id: ${VOD_TRANSCODE_TEMPLATE_GROUP_ID:}
