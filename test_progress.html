<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学员学习进度测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .data-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .data-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .data-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        
        .data-item.selected {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .data-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .data-item-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .data-item-info {
            font-size: 12px;
            color: #666;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 学员学习进度测试工具</h1>
            <p>为学员快速添加学习进度数据，用于测试和演示</p>
        </div>
        
        <div class="content">
            <!-- 统计信息 -->
            <div class="section">
                <div class="section-title">系统概览</div>
                <div class="stats" id="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="studentCount">-</div>
                        <div class="stat-label">学员总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="courseCount">-</div>
                        <div class="stat-label">课程总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="progressCount">-</div>
                        <div class="stat-label">已有进度记录</div>
                    </div>
                </div>
            </div>
            
            <!-- 学员列表 -->
            <div class="section">
                <div class="section-title">选择学员</div>
                <div class="data-list" id="studentList">
                    <div class="loading">正在加载学员列表...</div>
                </div>
            </div>
            
            <!-- 课程列表 -->
            <div class="section">
                <div class="section-title">选择课程</div>
                <div class="data-list" id="courseList">
                    <div class="loading">请先选择学员</div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="actions">
                <button class="btn btn-primary" id="completeBtn" disabled onclick="completeProgress()">
                    ✓ 推满课程进度（100%）
                </button>
                <button class="btn btn-secondary" onclick="resetSelection()">
                    ↺ 重置选择
                </button>
            </div>
            
            <!-- 结果提示 -->
            <div class="result" id="result"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8080';
        let students = [];
        let courses = [];
        let selectedStudentId = null;
        let selectedCourseId = null;
        
        // 加载学员列表
        async function loadStudents() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/settings/students?page=1&size=100`);
                const result = await response.json();
                
                if (result.code === 0) {
                    students = result.data.records || [];
                    renderStudents();
                    updateStats();
                } else {
                    showError('加载学员列表失败：' + result.message);
                }
            } catch (error) {
                showError('网络请求失败：' + error.message);
            }
        }
        
        // 渲染学员列表
        function renderStudents() {
            const container = document.getElementById('studentList');
            
            if (students.length === 0) {
                container.innerHTML = '<div class="empty">暂无学员数据</div>';
                return;
            }
            
            container.innerHTML = students.map(student => `
                <div class="data-item ${selectedStudentId === student.studentId ? 'selected' : ''}" 
                     onclick="selectStudent(${student.studentId})">
                    <div class="data-item-header">
                        <span class="data-item-title">${student.realName || '未命名'}</span>
                        <span style="color: #667eea; font-size: 12px;">ID: ${student.studentId}</span>
                    </div>
                    <div class="data-item-info">
                        账号: ${student.username || '—'} | 
                        科室: ${student.departmentName || '未分配'} | 
                        当前进度: ${student.averageProgressPercent || 0}%
                    </div>
                </div>
            `).join('');
        }
        
        // 选择学员
        function selectStudent(studentId) {
            selectedStudentId = studentId;
            selectedCourseId = null;
            renderStudents();
            loadCourses();
            updateButtonState();
        }
        
        // 加载课程列表
        async function loadCourses() {
            const container = document.getElementById('courseList');
            container.innerHTML = '<div class="loading">正在加载课程列表...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/courses?page=1&size=100`);
                const result = await response.json();
                
                if (result.code === 0) {
                    courses = result.data.records || [];
                    renderCourses();
                } else {
                    container.innerHTML = '<div class="empty">加载失败</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="empty">网络请求失败</div>';
            }
        }
        
        // 渲染课程列表
        function renderCourses() {
            const container = document.getElementById('courseList');
            
            if (courses.length === 0) {
                container.innerHTML = '<div class="empty">暂无课程数据</div>';
                return;
            }
            
            container.innerHTML = courses.map(course => `
                <div class="data-item ${selectedCourseId === course.courseId ? 'selected' : ''}" 
                     onclick="selectCourse(${course.courseId})">
                    <div class="data-item-header">
                        <span class="data-item-title">${course.title || '未命名课程'}</span>
                        <span style="color: #667eea; font-size: 12px;">ID: ${course.courseId}</span>
                    </div>
                    <div class="data-item-info">
                        类型: ${course.type || '—'} | 
                        状态: ${course.status || '草稿'}
                    </div>
                </div>
            `).join('');
        }
        
        // 选择课程
        function selectCourse(courseId) {
            selectedCourseId = courseId;
            renderCourses();
            updateButtonState();
        }
        
        // 更新按钮状态
        function updateButtonState() {
            const btn = document.getElementById('completeBtn');
            btn.disabled = !(selectedStudentId && selectedCourseId);
        }
        
        // 推满课程进度
        async function completeProgress() {
            if (!selectedStudentId || !selectedCourseId) {
                showResult('请先选择学员和课程', 'error');
                return;
            }
            
            const btn = document.getElementById('completeBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            
            try {
                const response = await fetch(
                    `${API_BASE}/api/admin/settings/students/${selectedStudentId}/courses/${selectedCourseId}/progress/complete`,
                    { method: 'PATCH' }
                );
                const result = await response.json();
                
                if (result.code === 0) {
                    showResult(`✓ 成功！学员学习进度已设置为 100%`, 'success');
                    await loadStudents(); // 重新加载学员列表
                } else {
                    showResult('操作失败：' + result.message, 'error');
                }
            } catch (error) {
                showResult('网络请求失败：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✓ 推满课程进度（100%）';
            }
        }
        
        // 重置选择
        function resetSelection() {
            selectedStudentId = null;
            selectedCourseId = null;
            renderStudents();
            document.getElementById('courseList').innerHTML = '<div class="loading">请先选择学员</div>';
            updateButtonState();
            hideResult();
        }
        
        // 显示结果
        function showResult(message, type) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = 'result ' + type;
        }
        
        // 隐藏结果
        function hideResult() {
            document.getElementById('result').className = 'result';
        }
        
        // 显示错误
        function showError(message) {
            showResult(message, 'error');
        }
        
        // 更新统计信息
        async function updateStats() {
            document.getElementById('studentCount').textContent = students.length;
            
            // 获取课程数量
            try {
                const response = await fetch(`${API_BASE}/api/admin/courses?page=1&size=1`);
                const result = await response.json();
                if (result.code === 0) {
                    document.getElementById('courseCount').textContent = result.data.total || 0;
                }
            } catch (error) {
                console.error('获取课程数量失败:', error);
            }
            
            // 计算进度记录数（这里简化处理）
            document.getElementById('progressCount').textContent = '-';
        }
        
        // 页面加载时初始化
        window.onload = () => {
            loadStudents();
        };
    </script>
</body>
</html>
